apiVersion: v1
kind: Namespace
metadata:
  name: ums
---
apiVersion: v1
kind: Secret
metadata:
  name: ums-secrets
  namespace: ums
type: Opaque
stringData:
  secret-key: "django-insecure-change-in-production"
  database-url: "postgres://user:pass@localhost:5432/ums"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ums-config
  namespace: ums
data:
  DEBUG: "false"
  ALLOWED_HOSTS: "ums.edu,api.ums.edu"
  CORS_ALLOWED_ORIGINS: "https://ums.edu"